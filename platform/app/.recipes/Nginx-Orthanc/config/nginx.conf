server {
    listen 443 ssl;
    server_name pacs.medicoveronline.com;

    ssl_certificate /etc/letsencrypt/live/pacs.medicoveronline.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pacs.medicoveronline.com/privkey.pem;

    root /var/www/html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_comp_level 9;
    etag on;

    # Service Worker – no change
    location /sw.js {
        add_header Cache-Control "no-cache";
        proxy_cache_bypass $http_pragma;
        proxy_cache_revalidate on;
        expires off;
        access_log off;
    }

    # OAuth2 Proxy endpoints – keep as is
    location /oauth2 {
        expires -1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Auth-Request-Redirect $request_uri;
        proxy_pass http://localhost:4180$uri$is_args$args;
    }

    location /oauth2/callback {
        proxy_pass http://localhost:4180;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /oauth2/sign_out {
        expires -1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Auth-Request-Redirect /oauth2/sign_in;
        proxy_pass http://localhost:4180;
    }

    # Admin PACS (unchanged)
    location /pacs-admin/ {
        error_page 401 = /oauth2/sign_in?rd=$scheme://$host$request_uri;
        auth_request /oauth2/auth?allowed_groups=pacsadmin;

        auth_request_set $user $upstream_http_x_auth_request_user;
        auth_request_set $token $upstream_http_x_auth_request_access_token;
        auth_request_set $auth_cookie $upstream_http_set_cookie;

        proxy_set_header X-User $user;
        proxy_set_header X-Access-Token $token;
        add_header Set-Cookie $auth_cookie;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 0;
        add_header Cache-Control private;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Origin, X-Requested-With, Content-Type, Accept' always;

        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Origin, X-Requested-With, Content-Type, Accept';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass http://orthanc:8042/;
    }

    location /pacs-admin {
        return 301 /pacs-admin/;
    }

    # DICOMweb proxy (unchanged)
    location /pacs/ {
        auth_request /oauth2/auth;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 0;
        add_header Cache-Control private;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Origin, X-Requested-With, Content-Type, Accept' always;

        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Origin, X-Requested-With, Content-Type, Accept';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass http://orthanc:8042/dicom-web/;
    }

    location /pacs {
        return 301 /pacs/;
    }

    # OHIF Viewer – served from root, with authentication
    location / {
        # Redirect to sign-in if not authenticated
        error_page 401 = /oauth2/sign_in?rd=$scheme://$host$request_uri;
        auth_request /oauth2/auth;

        # Pass user/token information if needed (optional)
        auth_request_set $user $upstream_http_x_auth_request_user;
        auth_request_set $token $upstream_http_x_auth_request_access_token;
        auth_request_set $auth_cookie $upstream_http_set_cookie;

        proxy_set_header X-User $user;
        proxy_set_header X-Access-Token $token;
        add_header Set-Cookie $auth_cookie;

        # Standard headers (not strictly required for static files, but kept for consistency)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Serve static files with SPA fallback to index.html
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache control for the entry point
        expires 0;
        add_header Cache-Control private;

        # Optional CORS headers (keep if OHIF needs them)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Origin, X-Requested-With, Content-Type, Accept' always;

        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Origin, X-Requested-With, Content-Type, Accept';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # Keycloak proxy (unchanged)
    location /keycloak/ {
        proxy_pass https://keyc.hrspace.in/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /keycloak {
        return 301 /keycloak/;
    }
}
